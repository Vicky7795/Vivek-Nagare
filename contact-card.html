<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Contact Card</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --hover-bg: #334155;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .contact-card {
            background: linear-gradient(145deg, var(--card-bg), #0f172a);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .contact-card h2 {
            color: var(--text-color);
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 600;
        }

        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .contact-item:hover {
            background: var(--hover-bg);
            border-color: var(--accent-color);
            transform: translateX(10px);
        }

        .contact-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-color);
            width: 100%;
            padding: 1rem 1.25rem;
            gap: 1.25rem;
        }

        .contact-link i {
            font-size: 1.25rem;
            width: 24px;
            text-align: center;
            color: var(--accent-color);
            transition: var(--transition);
        }

        .contact-item:hover i {
            transform: scale(1.1);
            color: #60a5fa; /* Lighter blue on hover */
        }

        .contact-text {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .contact-item:hover .contact-text {
            color: var(--text-color);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .contact-card {
                padding: 1.5rem;
            }
            
            .contact-text {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h2>Get In Touch</h2>
        <ul class="contact-list">
            <!-- Email -->
            <li class="contact-item">
                <a href="mailto:nagarevivek206@gmail.com" class="contact-link">
                    <i class="fas fa-envelope"></i>
                    <span class="contact-text">nagarevivek206@gmail.com</span>
                </a>
            </li>

            <!-- LinkedIn -->
            <li class="contact-item">
                <a href="https://linkedin.com/in/vivek-nagare" target="_blank" class="contact-link">
                    <i class="fab fa-linkedin-in"></i>
                    <span class="contact-text">linkedin.com/in/vivek-nagare</span>
                </a>
            </li>

            <!-- GitHub -->
            <li class="contact-item">
                <a href="https://github.com/Vicky7795" target="_blank" class="contact-link">
                    <i class="fab fa-github"></i>
                    <span class="contact-text">github.com/Vicky7795</span>
                </a>
            </li>

            <!-- Instagram -->
            <li class="contact-item">
                <a href="https://instagram.com/vicky_nagare_" target="_blank" class="contact-link">
                    <i class="fab fa-instagram"></i>
                    <span class="contact-text">instagram.com/vicky_nagare_</span>
                </a>
            </li>
        </ul>
    </div>

</body>
</html>
